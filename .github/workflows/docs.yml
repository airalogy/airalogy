name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - packages/npm/**
      - apps/aira-reader/**
      - apps/aimd-demo/**
      - schemas/**
      - scripts/aimd/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Resolve base path
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "ROOT_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ROOT_BASE=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Install npm workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs home
        run: pnpm docs:home:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}

      - name: Build Airalogy docs
        run: pnpm docs:airalogy:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}airalogy/

      - name: Build AIMD docs
        run: pnpm docs:aimd:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}aimd/

      - name: Build Airalogy Engine docs
        run: pnpm docs:airalogy-engine:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}airalogy-engine/

      - name: Build Airalogy Reader
        run: pnpm build:aira-reader
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}aira-reader/

      - name: Assemble Pages artifact
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp -R docs/home/.vitepress/dist/. .pages/
          mkdir -p .pages/airalogy .pages/aimd .pages/airalogy-engine .pages/aira-reader
          cp -R docs/airalogy/.vitepress/dist/. .pages/airalogy/
          cp -R docs/aimd/.vitepress/dist/. .pages/aimd/
          cp -R docs/airalogy-engine/.vitepress/dist/. .pages/airalogy-engine/
          cp -R apps/aira-reader/dist/. .pages/aira-reader/
          cp -R schemas .pages/schemas

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
