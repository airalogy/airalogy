name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - packages/npm/**
      - apps/aimd-demo/**
      - scripts/aimd/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Resolve base path
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "ROOT_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ROOT_BASE=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Install npm workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Airalogy docs
        run: pnpm docs:airalogy:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}airalogy/

      - name: Build AIMD docs
        run: pnpm docs:aimd:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}aimd/

      - name: Build Airalogy Engine docs
        run: pnpm docs:airalogy-engine:build
        env:
          BASE_PATH: ${{ env.ROOT_BASE }}airalogy-engine/

      - name: Assemble Pages artifact
        run: |
          mkdir -p .pages/airalogy .pages/aimd .pages/airalogy-engine
          cp -R docs/airalogy/.vitepress/dist/. .pages/airalogy/
          cp -R docs/aimd/.vitepress/dist/. .pages/aimd/
          cp -R docs/airalogy-engine/.vitepress/dist/. .pages/airalogy-engine/
          cat > .pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Airalogy Docs</title>
            </head>
            <body>
              <h1>Airalogy Docs</h1>
              <ul>
                <li><a href="./airalogy/">Airalogy Python docs</a></li>
                <li><a href="./aimd/">AIMD npm docs</a></li>
                <li><a href="./airalogy-engine/">Airalogy Engine docs</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
