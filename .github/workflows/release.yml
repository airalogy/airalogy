name: Release Python

on:
  push:
    branches:
      - main
    paths:
      - "packages/pypi/*/package.json"
      - "packages/pypi/*/CHANGELOG.md"
      - "packages/pypi/*/pyproject.toml"
      - "packages/pypi/*/uv.lock"
      - "scripts/release/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish PyPI packages
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify Python version metadata
        run: node scripts/release/sync-python-versions.mjs --check

      - name: Select PyPI packages to publish
        id: python
        run: node scripts/release/list-python-packages-to-publish.mjs

      - name: Build distributions
        if: steps.python.outputs.has_packages == 'true'
        run: |
          rm -rf dist-to-publish
          mkdir -p dist-to-publish
          for package_dir in ${{ steps.python.outputs.package_dirs }}; do
            uv build "$package_dir" --out-dir dist-to-publish
          done

      - name: Publish package distributions to PyPI
        if: steps.python.outputs.has_packages == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-to-publish
