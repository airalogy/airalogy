name: Release Python

on:
  push:
    tags:
      - "airalogy-v*"
      - "airalogy-engine-v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve package
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            airalogy-v*)
              echo "PACKAGE_NAME=airalogy" >> "$GITHUB_ENV"
              echo "PACKAGE_DIR=packages/pypi/airalogy" >> "$GITHUB_ENV"
              echo "EXPECTED_VERSION=${RELEASE_TAG#airalogy-v}" >> "$GITHUB_ENV"
              ;;
            airalogy-engine-v*)
              echo "PACKAGE_NAME=airalogy-engine" >> "$GITHUB_ENV"
              echo "PACKAGE_DIR=packages/pypi/airalogy-engine" >> "$GITHUB_ENV"
              echo "EXPECTED_VERSION=${RELEASE_TAG#airalogy-engine-v}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Verify release version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          expected_version = os.environ["EXPECTED_VERSION"]
          pyproject_path = pathlib.Path(os.environ["PACKAGE_DIR"]) / "pyproject.toml"
          pyproject = tomllib.loads(pyproject_path.read_text())
          pyproject_version = pyproject["project"]["version"]

          if pyproject_version != expected_version:
              raise SystemExit(
                  f"{pyproject_path} has {pyproject_version}, expected {expected_version}"
              )

          print(f"Validated {os.environ['PACKAGE_NAME']} {expected_version}")
          PY

      - name: Build distributions
        run: uv build "$PACKAGE_DIR" --out-dir dist-to-publish

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-distributions
          path: dist-to-publish/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Resolve package name
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            airalogy-v*) echo "PACKAGE_NAME=airalogy" >> "$GITHUB_ENV" ;;
            airalogy-engine-v*) echo "PACKAGE_NAME=airalogy-engine" >> "$GITHUB_ENV" ;;
          esac

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
