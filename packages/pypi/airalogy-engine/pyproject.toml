[project]
name = "airalogy-engine"
# Release versions are managed by Changesets through package.json and synced into this file.
version = "0.0.5"
description = "Airalogy protocol execute sandbox"
readme = "README.md"
authors = [{ name = "Airalogy Team" }]
requires-python = ">=3.13"
dependencies = ["boxlite==0.9.5"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: Implementation :: CPython",
]
license = { text = "Apache-2.0" }

[project.urls]
Documentation = "https://airalogy.github.io/airalogy/airalogy-engine/"
Source = "https://github.com/airalogy/airalogy/tree/main/packages/pypi/airalogy-engine"


[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv]
required-version = ">=0.11,<0.12"

[tool.uv.sources]
airalogy = { path = "../airalogy", editable = true }

[dependency-groups]
dev = ["airalogy~=0.11.0", "pytest>=9.0.2", "pytest-asyncio>=0.25.0"]
